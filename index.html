<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | NFT preview card component</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <article>
        <section class="head">
          <img
            src="images/image-equilibrium.jpg"
            alt="image of a cube in perfect equlibrium"
            height="604"
            width="604"
          />
        </section>
        <section class="body">
          <h1>Equilibrium #3429</h1>
          <p class="text">
            Our Equilibrium collection promotes balance and calm.
          </p>
          <table>
            <tr>
              <td>
                <img
                  src="images/icon-ethereum.svg"
                  alt="ethereum icon color cyan"
                  height="18"
                  width="11"
                />
                <p class="eth">0.041 ETH</p>
              </td>
              <td>
                <img
                  src="images/icon-clock.svg"
                  alt="a clock icon"
                  height="17"
                  width="17"
                />
                <p class="time"><time datetime="3d">3 days</time> left</p>
              </td>
            </tr>
          </table>
        </section>
        <section class="foot">
          <img
            src="images/image-avatar.png"
            alt="image of Jules Wyvern"
            height="132"
            width="132"
          />
          <p><span class="neut">Creation of</span> Jules Wyvern</p>
        </section>
      </article>
    </main>
  </body>
</html>
